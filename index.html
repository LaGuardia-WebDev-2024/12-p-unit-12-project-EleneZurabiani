<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Quiz About [Me]</h1>
    <hr />
    <!-- Movie Question -->
    <form id="donut-form">
      <label>
         What is my favorite thing to munch?
        <select id="donut-answer">
          <option value="donut1">Paris Baguette Snowman donut</option>
          <option value="donut2">Paris Baguette King Cream donut</option>
          <option value="donut3">Paris baguette Cereal donut</option>
          <option value="donut4">paris baguette Valentine donut</option>
        </select>
      </label>
      <button type="submit">Check Munchy Answer</button>
    </form>
    <div id="donut-result" class="result-box">
      <p id="donut-text"></p>
    </div>
    <hr />
    <!-- Book Question -->
    <form id="hubby-form">
      <label>
        Who's my husband?
        <select id="hubby-answer">
          <option value="hubby1">Time skip Zuko</option>
          <option value="hubby2">Time skip Aang</option>
          <option value="hubby3">Uncle Iroh</option>
          <option value="hubby4">Time skip Sokka</option>
        </select>
      </label>
      <button type="submit">Check Hubby Answer</button>
    </form>
    <div id="hubby-result" class="result-box">
      <p id="hubby-text"></p>
    </div>

    <section class="images">
      <h2>Three Things I Love</h2>
      <div class="image-grid">
        <figure>
          <img src="https://m.media-amazon.com/images/M/MV5BYjA2NzhlMDItNWRmZC00MzRjLWE3ZjAtZjBlZDAwOWY2ODdjXkEyXkFqcGc@._V1_FMjpg_UX1000_.jpg"  />
          <figcaption>Arcane</figcaption>
        </figure>
        <figure>
          <img src="https://e.snmc.io/lk/f/x/b7b87a74f7ff56c93ca380e99a5d4f00/10959333"  />
          <figcaption>Tradej The Walking Dead Game</figcaption>
        </figure>
        <figure>
          <img src="https://via.placeholder.com/300x180?text=Favorite+Snack"  />
          <figcaption>Redbull</figcaption>
        </figure>
      </div>
    </section>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      $(document).ready(function () {
        $("#donut-result").hide();
        $("#hubby-result").hide();
        
        $("#donut-form").on("submit", function (event) {
          event.preventDefault();

          var $answer = $("#donut-answer");
          var answer = $answer.val();

          if (answer === "donut1") {
            $("#donut-text").text("OH YEAAHHH U KNOW WHATSSUUUP");
            $("#donut-result")
              .css("background-color", "#c8f4ff")
              .slideDown("slow")
              .animate({ paddingLeft: "24px", fontSize: "26px" }, 400);
          } else {
            $("#donut-text").text("naw dawg, try again);
            $("#donut-result")
              .css("background-color", "#ffd4d4")
              .slideDown("slow");
          }
        });

       
        $("#hubby-form").on("submit", function (event) {
          event.preventDefault();

          var $answer = $("#hubby-answer");
          var answer = $answer.val();

          if (answer === "hubby1") {
            $("#hubby-text").text("yes.");
            $("#hubby-result")
              .css({ width: "60%", opacity: 0, display: "block", backgroundColor: "#d1ffd6" })
              .animate({ width: "100%", opacity: 1 }, 800);
          } else {
            $("#hubby-text").text("like yes, but not the right yes, try again");
            $("#hubby-result")
              .css({ width: "80%", opacity: 0, display: "block", backgroundColor: "#fff5b8" })
              .animate({ width: "100%", opacity: 1 }, 800);
          }
        });
      });
    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
